<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A halott, aki nem tudja, hogy halott</title>
<meta property="og:type" content="article">
<meta property="og:title" content="A halott, aki nem tudja, hogy halott">
<meta property="og:description" content="A propagandamédia nem áprilisban halt meg — sosem élt. Véleménycikk bemutató.">
<meta property="og:image" content="https://bandras1949.github.io/propaganda/borito.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="hu_HU">
<meta property="og:url" content="https://bandras1949.github.io/propaganda/">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.5/dist/reveal.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.0.5/dist/theme/black.css">
<style>
  html, body { margin: 0; padding: 0; background: #000; }
  .reveal { background: #000; }
  .reveal .slides { background: #000; }
  .reveal .slides section {
    padding: 0; margin: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .reveal .slides section img.slide-img {
    max-width: 100%; max-height: 100%; width: 100%; height: 100%;
    object-fit: contain; margin: 0; padding: 0;
    border: none; box-shadow: none; background: transparent;
  }
  .reveal .controls { color: rgba(255,255,255,0.5); }
  .reveal .controls:hover { color: rgba(255,255,255,0.9); }
  .reveal .progress { height: 4px; color: #c0392b; }
  .slide-counter {
    position: fixed; bottom: 12px; right: 20px;
    font-family: 'Arial', sans-serif; font-size: 14px;
    color: rgba(255,255,255,0.4); z-index: 100; pointer-events: none;
  }
</style>
</head>
<body>
<div class="reveal">
  <div class="slides">
    <section data-background-color="#000"><img class="slide-img" src="img/slide-1.jpg" alt="Slide 1"></section>
    <section data-background-color="#000"><img class="slide-img" src="img/slide-2.jpg" alt="Slide 2"></section>
    <section data-background-color="#000"><img class="slide-img" src="img/slide-3.jpg" alt="Slide 3"></section>
    <section data-background-color="#000"><img class="slide-img" src="img/slide-4.jpg" alt="Slide 4"></section>
    <section data-background-color="#000"><img class="slide-img" src="img/slide-5.jpg" alt="Slide 5"></section>
    <section data-background-color="#000"><img class="slide-img" src="img/slide-6.jpg" alt="Slide 6"></section>
    <section data-background-color="#000"><img class="slide-img" src="img/slide-7.jpg" alt="Slide 7"></section>
    <section data-background-color="#000"><img class="slide-img" src="img/slide-8.jpg" alt="Slide 8"></section>
    <section data-background-color="#000"><img class="slide-img" src="img/slide-9.jpg" alt="Slide 9"></section>
  </div>
</div>
<div class="slide-counter" id="slideCounter"></div>
<script src="https://cdn.jsdelivr.net/npm/reveal.js@5.0.5/dist/reveal.js"></script>
<script>
  Reveal.initialize({
    hash: true, history: true,
    controls: true, controlsTutorial: false,
    progress: true, center: true,
    transition: 'fade', transitionSpeed: 'default',
    backgroundTransition: 'fade',
    width: 1920, height: 1080,
    margin: 0, minScale: 0.2, maxScale: 1.5,
    keyboard: true, touch: true, embedded: false, loop: false,
  });
  var counter = document.getElementById('slideCounter');
  function updateCounter() {
    var idx = Reveal.getIndices();
    counter.textContent = (idx.h + 1) + ' / ' + Reveal.getTotalSlides();
  }
  Reveal.on('slidechanged', updateCounter);
  Reveal.on('ready', updateCounter);
</script>
</body>
</html>
